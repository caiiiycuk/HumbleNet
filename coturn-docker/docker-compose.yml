x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    container_name: coturn-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${ACME_PORT:-80}:80"
      - "8000:8000"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ping.html:/usr/share/nginx/html/ping.html:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1:8000/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  coturn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coturn-server
    restart: unless-stopped
    logging: *default-logging
    network_mode: host
    volumes:
      - coturn-data:/var/lib/coturn
      - certbot-certs:/etc/letsencrypt:ro
      - ./turnserver.conf.template:/etc/turnserver.conf.template:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "turnutils_stunclient", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  certbot:
    image: certbot/certbot
    container_name: coturn-certbot
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook \"touch /etc/letsencrypt/renewed\"; sleep 12h & wait $${!}; done'"

volumes:
  coturn-data:
  certbot-webroot:
  certbot-certs:
